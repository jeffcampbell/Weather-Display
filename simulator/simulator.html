// =========================================================================
// Framebuffer primitives
// =========================================================================
function clearFB() {
  for (let y = 0; y < HEIGHT; y++)
    for (let x = 0; x < WIDTH; x++) fb[y][x] = [0,0,0];
}
function hexToRGB(h) { return [(h>>16)&0xFF,(h>>8)&0xFF,h&0xFF]; }
function setPixel(x, y, rgb) {
  if (x >= 0 && x < WIDTH && y >= 0 && y < HEIGHT) fb[y][x] = rgb;
}
function fillRect(x0, y0, w, h, rgb) {
  for (let y = y0; y < y0+h; y++)
    for (let x = x0; x < x0+w; x++) setPixel(x, y, rgb);
}
function drawVSep(x, colorHex) {
  const rgb = hexToRGB(colorHex);
  for (let y = 0; y < HEIGHT; y++) setPixel(x, y, rgb);
}

// Draw 8x8 icon from bitmap bytes
function drawIcon8(iconBytes, x0, y0, colorHex) {
  const rgb = hexToRGB(colorHex);
  for (let row = 0; row < 8; row++) {
    const byte = iconBytes[row];
    for (let col = 0; col < 8; col++) {
      if (byte & (1 << (7 - col))) setPixel(x0 + col, y0 + row, rgb);
    }
  }
}

// Large font: 6px wide, 7px tall glyphs (terminalio)
function drawTextLarge(text, x, yCenter, colorHex) {
  const rgb = hexToRGB(colorHex);
  const yTop = yCenter - 3;
  for (let i = 0; i < text.length; i++) {
    const glyph = FONT_DATA[text.charCodeAt(i)];
    if (!glyph) continue;
    for (let col = 0; col < 5; col++) {
      const bits = glyph[col];
      for (let row = 0; row < 7; row++) {
        if (bits & (1 << row)) setPixel(x + i * FONT_W + col, yTop + row, rgb);
      }
    }
  }
}

// Mid font: 5px wide, same glyphs tighter spacing (5x8.bdf)
function drawTextMid(text, x, yCenter, colorHex) {
  const rgb = hexToRGB(colorHex);
  const yTop = yCenter - 3;
  for (let i = 0; i < text.length; i++) {
    const glyph = FONT_DATA[text.charCodeAt(i)];
    if (!glyph) continue;
    for (let col = 0; col < 5; col++) {
      const bits = glyph[col];
      for (let row = 0; row < 7; row++) {
        if (bits & (1 << row)) setPixel(x + i * FONT_MID_W + col, yTop + row, rgb);
      }
    }
  }
}

// Small font: 4px wide, ~5px tall (4x6.bdf approximation)
function drawTextSmall(text, x, yCenter, colorHex) {
  const rgb = hexToRGB(colorHex);
  const yTop = yCenter - 2;
  for (let i = 0; i < text.length; i++) {
    const glyph = FONT_DATA[text.charCodeAt(i)];
    if (!glyph) continue;
    for (let col = 0; col < 3; col++) {
      const srcCol = Math.min(col, 4);
      const bits = glyph[srcCol];
      for (let row = 0; row < 5; row++) {
        const srcRow = Math.round(row * 6 / 5);
        if (bits & (1 << srcRow)) setPixel(x + i * FONT_SMALL_W + col, yTop + row, rgb);
      }
    }
  }
}

// Draw 14px-wide logo box with fill + dark border (plane screen)
function drawLogoBox(fillColorHex, borderColorHex) {
  const fill = hexToRGB(fillColorHex);
  const border = hexToRGB(borderColorHex);
  for (let y = 0; y < 32; y++) {
    for (let x = 0; x < 14; x++) {
      if (x === 0 || x === 13 || y === 0 || y === 31)
        setPixel(x, y, border);
      else
        setPixel(x, y, fill);
    }
  }
}

// =========================================================================
// Centering helpers — match device _center_mid / _center_small / _center_ship
// =========================================================================
function centerMidX(text) {
  return RIGHT_START + Math.floor((RIGHT_W - text.length * FONT_MID_W) / 2);
}
function centerSmallX(text) {
  return RIGHT_START + Math.floor((RIGHT_W - text.length * FONT_SMALL_W) / 2);
}
// Ship labels span x=16-63 (48px wide): x = 16 + (48 - len*4) // 2
function centerShipX(text) {
  return 16 + Math.floor((48 - text.length * FONT_SMALL_W) / 2);
}

// =========================================================================
// LED matrix renderer
// =========================================================================
function renderMatrix() {
  ctx.fillStyle = '#0c0c0c';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  for (let y = 0; y < HEIGHT; y++) {
    for (let x = 0; x < WIDTH; x++) {
      const cx = x * SCALE + SCALE / 2;
      const cy = y * SCALE + SCALE / 2;
      const [r, g, b] = fb[y][x];
      if (r > 0 || g > 0 || b > 0) {
        ctx.save();
        ctx.shadowBlur = GLOW_BLUR;
        ctx.shadowColor = `rgb(${r},${g},${b})`;
        ctx.beginPath();
        ctx.arc(cx, cy, LED_RADIUS + 0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},0.3)`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, LED_RADIUS, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, LED_RADIUS);
        grad.addColorStop(0, `rgb(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)})`);
        grad.addColorStop(0.5, `rgb(${r},${g},${b})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0.7)`);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();
      } else {
        ctx.beginPath();
        ctx.arc(cx, cy, LED_RADIUS * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = '#151515';
        ctx.fill();
      }
    }
  }
}

// =========================================================================
// Zone guides overlay — draws boundary lines and overflow highlights
// =========================================================================
function toggleOverlay() {
  overlayEnabled = !overlayEnabled;
  document.getElementById('btnOverlay').textContent = overlayEnabled ? 'Guides ON' : 'Guides OFF';
  if (!overlayEnabled) octx.clearRect(0, 0, CANVAS_W, CANVAS_H);
}

function renderOverlay() {
  octx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  octx.save();

  // Vertical zone boundaries
  const vLines = [
    // x=13/14 — plane/ship logo box right edge (14px wide)
    { x: 13.5, color: 'rgba(255,100,0,0.75)',  label: '14' },
    // x=15/16 — plane/ship content start
    { x: 15.5, color: 'rgba(255,180,0,0.75)',  label: '16' },
    // x=20 — separator / basin right edge
    { x: 19.5, color: 'rgba(60,180,255,0.75)', label: '20' },
    // x=21 — right panel start
    { x: 20.5, color: 'rgba(0,220,120,0.65)',  label: '21' },
    // x=63 — right edge (any pixel here is at the boundary)
    { x: 63,   color: 'rgba(255,60,60,0.9)',   label: '63' },
  ];

  octx.font = 'bold 8px monospace';
  octx.textBaseline = 'top';
  octx.setLineDash([4, 4]);
  octx.lineWidth = 1.5;

  for (const {x, color, label} of vLines) {
    const px = (x + 0.5) * SCALE;
    octx.strokeStyle = color;
    octx.fillStyle = color;
    octx.beginPath();
    octx.moveTo(px, 0);
    octx.lineTo(px, CANVAS_H);
    octx.stroke();
    octx.fillText(label, px + 3, 2);
  }

  // Horizontal content row markers
  const hRows = [
    { y: 4,  label: 'y4'  },
    { y: 12, label: 'y12' },
    { y: 13, label: 'y13' },
    { y: 20, label: 'y20' },
    { y: 27, label: 'y27' },
    { y: 28, label: 'y28' },
    { y: 29, label: 'y29' },
  ];

  octx.strokeStyle = 'rgba(220,220,0,0.4)';
  octx.fillStyle   = 'rgba(220,220,0,0.6)';
  octx.setLineDash([2, 8]);
  octx.lineWidth = 1;

  for (const {y, label} of hRows) {
    const py = y * SCALE;
    octx.beginPath();
    octx.moveTo(0, py);
    octx.lineTo(CANVAS_W, py);
    octx.stroke();
    octx.fillText(label, 2, py + 1);
  }

  // Overflow highlight — magenta box around any lit pixel at x=63 (right boundary)
  octx.setLineDash([]);
  octx.strokeStyle = '#FF00FF';
  octx.lineWidth = 2;
  for (let y = 0; y < HEIGHT; y++) {
    const [r, g, b] = fb[y][63];
    if (r > 0 || g > 0 || b > 0) {
      octx.strokeRect(63 * SCALE + 1, y * SCALE + 1, SCALE - 2, SCALE - 2);
    }
  }

  octx.restore();
}

  'ACA':{name:'Air Cana',iata:'AC',color:0xCC0000},
};
function getAirlineInfo(callsign) {
  const p = callsign.substring(0, 3).toUpperCase();
  return AIRLINE_PREFETCH[p] || {name: p, iata: p.substring(0, 2), color: 0x00AA44};
}

// Ship type colors (mirrors device SHIP_TYPE_COLORS)
const SHIP_TYPE_COLORS = {
  3:0x44AA44, 4:0xFF8800, 5:0xAAAA00,
  6:0x44AAFF, 7:0xCC8844, 8:0xFF4444, 9:0x888888,
};
function getShipColor(tc) {
  return SHIP_TYPE_COLORS[Math.floor((tc || 0) / 10)] || 0x666688;
}

// Heading to compass direction (N/NE/E/SE/S/SW/W/NW)
function headingToCompass(h) {
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(((h % 360) + 360) % 360 / 45) % 8];
}

// Temp color — matches device show_weather_tides logic
function getTempColor(tempStr) {
  let v = 60;
  try { v = parseInt(tempStr.split('°')[0]); } catch(e) {}
  if (v >= 90) return 0xFF2222;
  if (v >= 80) return 0xFF8800;
  if (v >= 60) return 0xFFDD00;
  if (v >= 40) return 0x88FFCC;
  if (v >= 20) return 0x44AAFF;
  return 0x2255CC;
}

// ICAO airport code → 3-letter display (mirrors device icao_to_display)
function icaoToDisplay(icao) {
  if (!icao) return '???';
  if (icao.length === 4 && icao[0] === 'K') return icao.substring(1);
  if (icao.length === 4 && icao.startsWith('CY')) return icao.substring(1);
  return icao.substring(0, 3);
}

// --- Weather screen ---
// Left:  x=0-19 animated tide basin + tide time at y=29
//        x=20 vertical separator (dark) + white direction pixel
// Right: x=21-63 (43px wide)
//   y=4:  clock (mid font, centered)
//   y=12: weather icon (8x8) + temp (mid font, centered pair)
//   y=20: condition (small font, centered)
//   y=28: wind (small font, centered)
function composeWeather(timestamp) {
  clearFB();

  // Water column — x=0-19, depth driven by tide level
  const waterTop = Math.max(8, Math.min(30, Math.floor(30 - _tide_level * 22)));
  const w = Math.min(_wind_speed, 25);
  const calm = w < 5;
  const amplitude  = 0.3 + w * 0.06;
  const speed      = 0.3 + w * 0.02;
  const chop       = 0.5 + w * 0.03;
  const threshold  = 0.2 - w * 0.02;
  const extraRows  = w >= 15 ? 1 : 0;

  // Basin palette colors (match device basin_pal)
  const deep = [3, 20, 32];    // basin_pal[1] = 0x031420
  const mid  = [6, 40, 56];    // basin_pal[2] = 0x062838
  const surf = [12, 56, 80];   // basin_pal[3] = 0x0C3850
  const hullGray = [187,187,187]; // basin_pal[4] = 0xBBBBBB
  const superAmber = [255,136,34]; // basin_pal[5] = 0xFF8822

  // Ship silhouette spans in water column (drawn when ships present)
  // cx = BASIN_W // 2 = 10
  const cx = BASIN_W >> 1;
  const hasShip = ships.length > 0;
  const shipSpans = hasShip ? [
    [waterTop - 3, cx - 1, cx,     superAmber],  // funnel  2px amber
    [waterTop - 2, cx - 3, cx + 2, superAmber],  // bridge  6px amber
    [waterTop - 1, cx - 5, cx + 5, hullGray],    // deck   11px gray
    [waterTop,     cx - 5, cx + 5, hullGray],    // hull   11px gray
    [waterTop + 1, cx - 4, cx + 4, hullGray],    // keel    9px gray
  ] : [];

  for (let row = 0; row < 32; row++) {
    // Check ship silhouette span for this row
    let shipX1 = -1, shipX2 = -1, shipRgb = null;
    for (const [sr, sx1, sx2, srgb] of shipSpans) {
      if (sr === row) { shipX1 = Math.max(0, sx1); shipX2 = Math.min(BASIN_W-1, sx2); shipRgb = srgb; break; }
    }

    for (let col = 0; col < BASIN_W; col++) {
      if (shipRgb && col >= shipX1 && col <= shipX2) {
        setPixel(col, row, shipRgb);
      } else if (row < waterTop - extraRows) {
        // air — leave black
      } else if (row <= waterTop) {
        if (calm) {
          setPixel(col, row, surf);
        } else {
          let wave = Math.sin(col * chop + _basin_tick * speed) * amplitude;
          if (w >= 10) wave += Math.sin(col * 1.3 + _basin_tick * speed * 1.7) * amplitude * 0.4;
          if (wave > threshold) setPixel(col, row, surf);
        }
      } else if (row === waterTop + 1) {
        if (calm) {
          setPixel(col, row, mid);
        } else {
          const wave = Math.sin(col * chop + _basin_tick * speed + 1.0);
          setPixel(col, row, wave > 0 ? surf : mid);
        }
      } else {
        setPixel(col, row, deep);
      }
    }
  }

  // Tide time / HIGH / LOW at bottom of left column (x=1, y=29)
  const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
  let tideDisplay = tide_str;
  let tideLabelColor = _tide_level < 0.2 ? 0xFFFFFF : 0x00CCDD;
  for (const p of _tide_predictions) {
    if (Math.abs(p[0] - nowMins) <= 15) {
      tideDisplay = p[1] === 'H' ? 'HIGH' : 'LOW';
      tideLabelColor = 0xFFFFFF;
      break;
    }
  }
  drawTextSmall(tideDisplay, 1, 29, tideLabelColor);

  // Vertical separator at x=20 (dark, drawn after basin)
  drawVSep(SEP_X, 0x222233);

  // Tide direction pixel — white pixel at x=20 moving up (rising) or down (ebbing)
  if (!_tide_at_slack) {
    setPixel(SEP_X, _sep_pixel_y, [255, 255, 255]);
  }

  // Clock — centered in right panel, mid font, y=4
  const now = new Date();
  let h = now.getHours() % 12 || 12;
  const m = now.getMinutes().toString().padStart(2, '0');
  const ap = now.getHours() < 12 ? 'A' : 'P';
  const clockStr = `${h}:${m} ${ap}M`;
  drawTextMid(clockStr, centerMidX(clockStr), 4, 0xFFFFFF);

  // Weather icon + temp — positioned as a pair, centered in right panel
  const iconName  = ICON_MAP[weather_condMain] || 'cloud';
  const iconColor = ICON_COLORS[weather_condMain] || 0xAAAAAA;
  const tempColor = getTempColor(weather_str);
  const tw = weather_str.length * FONT_MID_W;
  const tempX = RIGHT_START + Math.floor((RIGHT_W - tw) / 2);
  drawIcon8(ICONS[iconName], tempX - 10, 9, iconColor);
  drawTextMid(weather_str, tempX, 12, tempColor);

  // Condition — centered, small font, y=20
  drawTextSmall(weather_cond, centerSmallX(weather_cond), 20, 0x888899);

  // Wind — centered, small font, y=28
  drawTextSmall(wind_str, centerSmallX(wind_str), 28, 0x6699AA);

  setStatus(`Weather: ${weather_str} ${weather_cond} | Wind: ${wind_str} | Tide: ${tideDisplay} (${tide_type_val})`);
}

// --- Plane screen ---
// Left: x=0-13 airline logo box (airline color + dark border)
//        IATA code centered, large font, y=16
// Right: x=16+ (no separator on plane screen)
//   y=4:  route "BOS>SFO" — large font, x=16
//   y=13: airline name (small, x=16) + type right-aligned (small)
//   y=20: altitude "35k NW" — small font, x=16
//   y=27: registration — small font, x=16
// Plane format from Pi: [callsign, icao24, alt_ft, spd_kt, hdg, vrate]
function composePlane(plane) {
  clearFB();
  const callsign = plane[0];
  const altFt    = plane[2];
  const hdg      = plane[4];
  const info     = getAirlineInfo(callsign);
  const flight   = flightCache[callsign] || {};
  const color    = info.color;
  const r = (color>>16)&0xFF, g = (color>>8)&0xFF, b = color&0xFF;
  const darkColor = ((r>>2)<<16) | ((g>>2)<<8) | (b>>2);

  // Left column: airline logo box (14px wide, full height)
  drawLogoBox(color, darkColor);

  // IATA code centered in 14px box — large font (6px/char), y=16
  const bright = r * 0.299 + g * 0.587 + b * 0.114;
  const textColor = bright > 140 ? 0x111111 : 0xFFFFFF;
  const iataX = 1 + Math.floor((14 - info.iata.length * FONT_W) / 2);
  drawTextLarge(info.iata, iataX, 16, textColor);

  // Row 1 (y=4): route — large font, x=16
  const origin = flight.origin || '???';
  const dest   = flight.dest   || '???';
  drawTextLarge(`${origin}>${dest}`, 16, 4, 0xFFFFFF);

  // Row 2 (y=13): airline name (left) + type (right) — small font
  drawTextSmall(info.name.substring(0, 8), 16, 13, color);
  const acType = flight.type || '';
  if (acType) {
    const typeX = Math.max(18, 64 - acType.length * FONT_SMALL_W);
    drawTextSmall(acType, typeX, 13, 0x55AADD);
  }

  // Row 3 (y=20): altitude + heading — small font, x=16
  const altK = Math.floor(altFt / 1000);
  if (altK > 0) {
    drawTextSmall(`${altK}k ${headingToCompass(hdg)}`, 16, 20, 0x44AA44);
  }

  // Row 4 (y=27): registration — small font, x=16
  const reg = flight.reg || '';
  if (reg) drawTextSmall(reg, 16, 27, 0x667788);

  setStatus(`Plane: ${callsign} | ${origin}>${dest} | ${info.name} | ${altK}k ft`);
}

// --- Ship screen ---
// Left: x=0-13 ocean blue (0x0A2A40) with ship silhouette scaled to vessel length
//        Silhouette: gray hull (0xDDDDDD), vertical orientation
// Right: x=16-63 (48px wide), all 4 rows use _center_ship centering
//   y=5:  ship name — small font, white
//   y=12: type name — small font, ship color
//   y=19: destination — small font, gray (0x888899)
//   y=26: distance + heading — small font, light blue (0x6699AA)
function composeShip(ship) {
  clearFB();
  const tc       = ship.type || 0;
  const color    = getShipColor(tc);
  const typeName = ship.type_name || 'Vessel';

  // Left column: ocean blue background (no border)
  const oceanBlue = [10, 42, 64];   // 0x0A2A40
  const shipGray  = [221, 221, 221]; // 0xDDDDDD
  for (let y = 0; y < 32; y++)
    for (let x = 0; x < 14; x++)
      setPixel(x, y, oceanBlue);

  // Ship silhouette — scaled by length (30-300m → 10-28px tall)
  // Matches device show_ship() drawing logic exactly
  const length = ship.length || 50;
  const ship_h = Math.max(10, Math.min(28, Math.floor(10 + (length - 30) * 18 / 270)));
  const ship_w = Math.max(4, Math.min(10, Math.floor(ship_h / 3) + 2));
  const y_start = Math.floor((32 - ship_h) / 2);
  const bow_len = Math.max(2, Math.floor(ship_h / 5));
  const scx = 7; // cx of 14px column

  for (let i = 0; i < ship_h; i++) {
    const y = y_start + i;
    if (y < 0 || y > 31) continue;
    let hw;
    if (i < bow_len) {
      hw = Math.max(1, Math.floor(ship_w * (i + 1) / (bow_len + 1) / 2));
    } else if (i >= ship_h - 2) {
      hw = Math.floor(ship_w / 2) - 1;
    } else {
      hw = Math.floor(ship_w / 2);
    }
    for (let x = scx - hw; x <= scx + hw; x++) {
      if (x >= 0 && x < 14) setPixel(x, y, shipGray);
    }
  }

  // Ship name (white) — _center_ship: x = 16 + (48 - len*4) // 2
  const name = (ship.name || 'UNKNOWN').substring(0, 12);
  drawTextSmall(name, centerShipX(name), 5, 0xFFFFFF);

  // Type name (ship color)
  const typeStr = typeName.substring(0, 10);
  drawTextSmall(typeStr, centerShipX(typeStr), 12, color);

  // Destination (gray)
  const dest = (ship.destination || '').substring(0, 12);
  if (dest) drawTextSmall(dest, centerShipX(dest), 19, 0x888899);

  // Distance + heading (light blue)
  const dist    = ship.distance_mi || 0;
  const compass = headingToCompass(ship.heading || 0);
  const infoStr = dist ? `${dist}mi ${compass}` : compass;
  drawTextSmall(infoStr, centerShipX(infoStr), 26, 0x6699AA);

  setStatus(`Ship: ${ship.name} | ${typeName} | ${dest || 'no dest'}`);
}

function composeLoading(timestamp) {
  clearFB();
  const pulse = Math.sin(timestamp / 1000 * 2) * 0.3 + 0.7;
  const v = Math.floor(255 * pulse);
  drawTextLarge("LOADING...", 4, 12, (v << 16) | (v << 8));
}

// =========================================================================
// API fetchers
// =========================================================================
async function fetchWeather() {
  try {
    const resp = await fetch('/api/weather');
    const data = await resp.json();
    const temp = Math.round(data.main.temp);
    weather_condMain = data.weather[0].main;
    const condId = data.weather[0].id;
    weather_cond = COND_SHORT[condId] || data.weather[0].description.substring(0, 10);
    weather_str  = `${temp}°F`;
    _wind_speed  = Math.round(data.wind?.speed || 0);
    wind_str     = `${_wind_speed}mph ${headingToCompass(data.wind?.deg || 0)}`;
    log(`Weather: ${weather_str} ${weather_cond} Wind: ${wind_str}`);
  } catch(e) { log(`Weather err: ${e.message}`, true); }
}

async function fetchTides() {
  try {
    const resp = await fetch('/api/tides');
    const data = await resp.json();
    const preds = data.predictions || [];
    const now   = new Date();
    const nowMins = now.getHours() * 60 + now.getMinutes();

    // Build predictions array for basin interpolation (today only)
    _tide_predictions = [];
    for (const p of preds) {
      const [hStr, mStr] = p.t.split(' ')[1].split(':');
      const h = parseInt(hStr), m = parseInt(mStr);
      _tide_predictions.push([h * 60 + m, p.type, h, mStr]);
    }

    // Find next upcoming tide today
    let found = false;
    for (const p of _tide_predictions) {
      if (p[0] >= nowMins) {
        tide_type_val = p[1];
        const h12 = p[2] % 12 || 12;
        tide_str = `${h12}:${p[3]}`;
        log(`Tide: ${tide_type_val === 'H' ? 'HI' : 'LO'} ${tide_str}`);
        found = true;
        break;
      }
    }

    // Tomorrow fallback (no two large JSON objects in memory simultaneously)
    if (!found) {
      try {
        const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
        const ds = tomorrow.toISOString().slice(0, 10).replace(/-/g, '');
        // NOAA doesn't accept a date override from here — server proxies it
        // The device's proxy fetches ?date=tomorrow; here we call /api/tides?date=tomorrow
        const resp2 = await fetch('/api/tides?date=tomorrow');
        const data2 = await resp2.json();
        const preds2 = data2.predictions || [];
        for (const p of preds2) {
          const [hStr, mStr] = p.t.split(' ')[1].split(':');
          const h = parseInt(hStr);
          const h12 = h % 12 || 12;
          tide_type_val = p.type;
          tide_str = `${h12}:${mStr}`;
          log(`Tide (tmr): ${tide_type_val === 'H' ? 'HI' : 'LO'} ${tide_str}`);
          found = true;
          break;
        }
      } catch(e) { /* fall through */ }
    }
    if (!found) { tide_str = 'N/A'; tide_type_val = ''; }

    interpolateTideLevel();
  } catch(e) { log(`Tide err: ${e.message}`, true); }
}

function interpolateTideLevel() {
  if (_tide_predictions.length < 2) { _tide_level = 0.5; return; }
  const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
  let prev = null, next = null;
  for (let i = 0; i < _tide_predictions.length; i++) {
    if (_tide_predictions[i][0] >= nowMins) {
      next = _tide_predictions[i];
      if (i > 0) prev = _tide_predictions[i - 1];
      break;
    }
  }
  if (!prev || !next) { _tide_level = tide_type_val === 'H' ? 0.7 : 0.3; return; }
  const span = next[0] - prev[0];
  if (span <= 0) { _tide_level = 0.5; return; }
  const progress = (nowMins - prev[0]) / span;
  if (prev[1] === 'L' && next[1] === 'H') _tide_level = progress;
  else if (prev[1] === 'H' && next[1] === 'L') _tide_level = 1.0 - progress;
  else _tide_level = 0.5;
}

async function fetchShips() {
  try {
    const resp = await fetch('/api/ships');
    const data = await resp.json();
    ships = data.ships || [];
    if (ships.length && _ship_cycle_start === 0) _ship_cycle_start = monotonic();
    log(`Ships: ${ships.length}`);
  } catch(e) { log(`Ships err: ${e.message}`, true); }
}

async function fetchRoute(callsign, icao24) {
  try {
    let url = `/api/route?callsign=${callsign}`;
    if (icao24) url += `&icao24=${icao24}`;
    const resp = await fetch(url);
    const data = await resp.json();
    const route  = data.route || [];
    const origin = route.length > 0 ? icaoToDisplay(route[0])             : '???';
    const dest   = route.length > 0 ? icaoToDisplay(route[route.length-1]) : '???';
    flightCache[callsign] = {
      origin, dest,
      type: data.typecode    || '',
      reg:  data.registration || '',
    };
    if (origin !== '???') log(`Route ${callsign}: ${origin}>${dest} ${data.typecode || ''}`);
  } catch(e) {
    flightCache[callsign] = {origin:'???', dest:'???', type:'', reg:''};
    log(`Route err ${callsign}: ${e.message}`, true);
  }
}

async function fetchPlanes() {
  try {
    const resp  = await fetch('/api/planes');
    const data  = await resp.json();
    planes = data.planes || [];
    log(`Planes: ${planes.length}`);
    // Fetch routes for any planes not yet cached
    for (const p of planes) {
      const callsign = p[0], icao24 = p[1];
      if (!flightCache[callsign]) await fetchRoute(callsign, icao24);
    }
  } catch(e) { log(`Planes err: ${e.message}`, true); }
}

// =========================================================================
// Derived: planes with confirmed route data (mirrors device get_displayable_planes)
// =========================================================================
function getDisplayablePlanes() {
  return planes.filter(p => {
    const f = flightCache[p[0]];
    return f && f.origin !== '???' && f.dest !== '???';
  });
}

// =========================================================================
// Main logic tick (1s interval) — fetches data and drives per-second state
// =========================================================================
async function logicTick() {
  const now = monotonic();

  if (now - last_weather_fetch >= WEATHER_INTERVAL) {
    await fetchWeather();
    await fetchTides();
    last_weather_fetch = now;
    dataLoaded = true;
  }

  if (PLANES_ENABLED && now - last_sky_fetch >= OPENSKY_INTERVAL) {
    await fetchPlanes();
    last_sky_fetch = now;
  }

  if (SHIPS_ENABLED && now - last_ship_fetch >= SHIP_INTERVAL) {
    await fetchShips();
    last_ship_fetch = now;
  }

  // Tide direction pixel — move 1px/s, hide during slack (±15 min of tide)
  const nowMins2 = new Date().getHours() * 60 + new Date().getMinutes();
  _tide_at_slack = false;
  for (const p of _tide_predictions) {
    if (Math.abs(p[0] - nowMins2) <= 15) { _tide_at_slack = true; break; }
  }
  if (!_tide_at_slack) {
    if (tide_type_val === 'H') _sep_pixel_y = (_sep_pixel_y - 1 + 32) % 32;
    else if (tide_type_val === 'L') _sep_pixel_y = (_sep_pixel_y + 1) % 32;
  }

  // Plane cycling (5s per plane)
  if (showing_planes) {
    if (now - last_plane_cycle >= PLANE_CYCLE_SECS) {
      plane_idx++;
      last_plane_cycle = now;
    }
  }
}

// =========================================================================
// Render loop (~60fps) — draws the current screen based on live state
// =========================================================================
let lastFrameTime = 0;
function renderLoop(timestamp) {
  const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.1);
  lastFrameTime = timestamp;
  _basin_tick += dt;

  if (!dataLoaded) {
    composeLoading(timestamp);
  } else {
    const displayPlanes = PLANES_ENABLED ? getDisplayablePlanes() : [];

    if (displayPlanes.length > 0) {
      // Planes have priority over ships and weather
      if (!showing_planes) {
        showing_planes   = true;
        plane_idx        = 0;
        last_plane_cycle = monotonic();
      }
      composePlane(displayPlanes[plane_idx % displayPlanes.length]);
    } else {
      if (showing_planes) showing_planes = false;

      const now = monotonic();
      if (SHIPS_ENABLED && ships.length > 0) {
        if (_ship_cycle_start === 0) _ship_cycle_start = now;
        const shipDisplayTotal = ships.length * 15;  // 15s per ship (matches device)
        const cyclePos = (now - _ship_cycle_start) % (SHIP_WEATHER_SECS + shipDisplayTotal);
        if (cyclePos >= SHIP_WEATHER_SECS) {
          const idx = Math.floor((cyclePos - SHIP_WEATHER_SECS) / 15) % ships.length;
          composeShip(ships[idx]);
        } else {
          composeWeather(timestamp);
        }
      } else {
        composeWeather(timestamp);
      }
    }
  }

  renderMatrix();
  if (overlayEnabled) renderOverlay();
  requestAnimationFrame(renderLoop);
}
