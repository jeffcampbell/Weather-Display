<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Portal Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #888;
  }
  #wrapper {
    position: relative;
    padding: 18px 22px;
    background: #111;
    border-radius: 6px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 2px rgba(255,255,255,0.05);
    border: 1px solid #222;
  }
  canvas { display: block; border-radius: 2px; }
  #status { margin-top: 16px; font-size: 12px; color: #555; text-align: center; max-width: 800px; }
  #log { margin-top: 12px; width: 800px; max-height: 160px; overflow-y: auto; background: #0d0d0d; border: 1px solid #222; border-radius: 4px; padding: 8px 12px; font-size: 11px; color: #4a4; line-height: 1.5; }
  #log .err { color: #a44; }
  #controls { margin-top: 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  button { background: #222; color: #888; border: 1px solid #333; padding: 5px 14px; border-radius: 4px; font-family: inherit; font-size: 12px; cursor: pointer; }
  button:hover { background: #2a2a2a; color: #aaa; }
  h2 { color: #444; font-size: 13px; font-weight: normal; margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>

<h2>Matrix Portal Simulator &mdash; 64&times;32 RGB LED</h2>
<div id="wrapper"><canvas id="matrix"></canvas></div>
<div id="status">Initializing...</div>
<div id="controls">
  <button onclick="injectTestWeather()">Cycle Weather</button>
  <button onclick="injectTestPlane()">Inject Plane</button>
  <button onclick="injectTestShip()">Inject Ship</button>
  <button onclick="clearAll()">Clear / Weather</button>
  <button onclick="forceRefresh()">Force Refresh</button>
</div>
<div id="log"></div>

<script src="config.js"></script>
<script>
// =========================================================================
// Matrix Portal Simulator — mirrors device/code.py display logic exactly
// =========================================================================

const WIDTH = 64, HEIGHT = 32;
const SCALE = 12;
const LED_RADIUS = 3.2;
const GLOW_BLUR = 6;
const CANVAS_W = WIDTH * SCALE;
const CANVAS_H = HEIGHT * SCALE;

const canvas = document.getElementById('matrix');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;
const ctx = canvas.getContext('2d');

// Framebuffer
const fb = [];
for (let y = 0; y < HEIGHT; y++) {
  fb[y] = [];
  for (let x = 0; x < WIDTH; x++) fb[y][x] = [0, 0, 0];
}

// =========================================================================
// Fonts — 3 sizes matching device
// =========================================================================
// FONT (terminalio): 6px wide cells, used for route + logo
// FONT_MID (5x8.bdf): 5px wide cells, used for clock + temp
// FONT_SMALL (tom-thumb): 4px wide cells, used for condition/wind/details

// Adafruit GFX 5x7 font data (column-encoded, LSB=top row)
const FONT_DATA = {

  33:[0x00,0x00,0x5F,0x00,0x00],
  40:[0x00,0x1C,0x22,0x41,0x00],41:[0x00,0x41,0x22,0x1C,0x00],

  99:[0x38,0x44,0x44,0x44,0x20],100:[0x38,0x44,0x44,0x48,0x7F],
  101:[0x38,0x54,0x54,0x54,0x18],102:[0x08,0x7E,0x09,0x01,0x02],
  103:[0x0C,0x52,0x52,0x52,0x3E],104:[0x7F,0x08,0x04,0x04,0x78],
  105:[0x00,0x44,0x7D,0x40,0x00],107:[0x7F,0x10,0x28,0x44,0x00],
  108:[0x00,0x41,0x7F,0x40,0x00],109:[0x7C,0x04,0x18,0x04,0x78],
  110:[0x7C,0x08,0x04,0x04,0x78],111:[0x38,0x44,0x44,0x44,0x38],
  112:[0x7C,0x14,0x14,0x14,0x08],114:[0x7C,0x08,0x04,0x04,0x08],
  115:[0x48,0x54,0x54,0x54,0x20],116:[0x04,0x3F,0x44,0x40,0x20],
  117:[0x3C,0x40,0x40,0x20,0x7C],118:[0x1C,0x20,0x40,0x20,0x1C],
  119:[0x3C,0x40,0x30,0x40,0x3C],120:[0x44,0x28,0x10,0x28,0x44],
  121:[0x0C,0x50,0x50,0x50,0x3C],
  176:[0x06,0x09,0x09,0x06,0x00], // degree
};

// Font rendering sizes
const FONT_W = 6;      // large: 6px per char
const FONT_MID_W = 5;  // mid: 5px per char
const FONT_SMALL_W = 4; // small: 4px per char (tom-thumb approximation)

// =========================================================================
// 8x8 Icon bitmaps (matching device exactly)
// =========================================================================
const ICONS = {
  sun:   [0x10,0x92,0x44,0x38,0xBA,0x44,0x92,0x10],
  cloud: [0x00,0x30,0x78,0x7C,0xFE,0xFE,0x7C,0x00],
  rain:  [0x30,0x78,0xFC,0x7C,0x00,0x54,0xA8,0x10],
  snow:  [0x30,0x78,0xFC,0x7C,0x00,0x48,0x24,0x48],
  storm: [0x30,0x78,0xFC,0xFE,0x18,0x30,0x10,0x08],
  fog:   [0x00,0xFE,0x00,0x7C,0x00,0xFE,0x00,0x7C],
};
const ICON_MAP = {
  Clear:'sun', Clouds:'cloud', Rain:'rain', Drizzle:'rain',
  Snow:'snow', Thunderstorm:'storm', Mist:'fog', Smoke:'fog',
  Haze:'fog', Dust:'fog', Fog:'fog', Sand:'fog', Ash:'fog',
};
const ICON_COLORS = {
  Clear:0xFFCC00, Clouds:0xAAAAAA, Rain:0x4488FF, Drizzle:0x4488FF,
  Snow:0xCCDDFF, Thunderstorm:0xAAAA00, Mist:0x888888, Fog:0x888888,
};

// =========================================================================
// Framebuffer drawing
// =========================================================================
function clearFB() {
  for (let y = 0; y < HEIGHT; y++)
    for (let x = 0; x < WIDTH; x++) fb[y][x] = [0,0,0];
}
function hexToRGB(h) { return [(h>>16)&0xFF,(h>>8)&0xFF,h&0xFF]; }
function setPixel(x, y, rgb) {
  if (x >= 0 && x < WIDTH && y >= 0 && y < HEIGHT) fb[y][x] = rgb;
}

// Draw 8x8 icon from bitmap bytes
function drawIcon8(iconBytes, x0, y0, colorHex) {
  const rgb = hexToRGB(colorHex);
  for (let row = 0; row < 8; row++) {
    const byte = iconBytes[row];
    for (let col = 0; col < 8; col++) {
      if (byte & (1 << (7 - col))) setPixel(x0 + col, y0 + row, rgb);
    }
  }
}

// Draw text with large font (6px wide, 7px tall glyphs)
function drawTextLarge(text, x, yCenter, colorHex) {
  const rgb = hexToRGB(colorHex);
  const yTop = yCenter - 3;
  for (let i = 0; i < text.length; i++) {
    const glyph = FONT_DATA[text.charCodeAt(i)];
    if (!glyph) continue;
    for (let col = 0; col < 5; col++) {
      const bits = glyph[col];
      for (let row = 0; row < 7; row++) {
        if (bits & (1 << row)) setPixel(x + i * FONT_W + col, yTop + row, rgb);
      }
    }
  }
}

// Draw text with mid font (5px wide, ~7px tall — same glyphs, tighter spacing)
function drawTextMid(text, x, yCenter, colorHex) {
  const rgb = hexToRGB(colorHex);
  const yTop = yCenter - 3;
  for (let i = 0; i < text.length; i++) {
    const glyph = FONT_DATA[text.charCodeAt(i)];
    if (!glyph) continue;
    for (let col = 0; col < 5; col++) {
      const bits = glyph[col];
      for (let row = 0; row < 7; row++) {
        if (bits & (1 << row)) setPixel(x + i * FONT_MID_W + col, yTop + row, rgb);
      }
    }
  }
}

// Draw text with small font (4px wide, ~5px tall — simplified rendering)
function drawTextSmall(text, x, yCenter, colorHex) {
  const rgb = hexToRGB(colorHex);
  const yTop = yCenter - 2;
  for (let i = 0; i < text.length; i++) {
    const glyph = FONT_DATA[text.charCodeAt(i)];
    if (!glyph) continue;
    // Scale down: use cols 0-3 of 5, rows 0-4 of 7 (sample every ~1.4)
    for (let col = 0; col < 3; col++) {
      const srcCol = Math.min(col, 4);
      const bits = glyph[srcCol];
      for (let row = 0; row < 5; row++) {
        const srcRow = Math.round(row * 6 / 5);
        if (bits & (1 << srcRow)) setPixel(x + i * FONT_SMALL_W + col, yTop + row, rgb);
      }
    }
  }
}

// Draw filled rectangle
function fillRect(x0, y0, w, h, rgb) {
  for (let y = y0; y < y0+h; y++)
    for (let x = x0; x < x0+w; x++) setPixel(x, y, rgb);
}

// Draw left column box (14px or 16px wide, full height) with border
function drawLeftColumn(w, fillColor, borderColor) {
  const fill = hexToRGB(fillColor);
  const border = hexToRGB(borderColor);
  for (let y = 0; y < 32; y++) {
    for (let x = 0; x < w; x++) {
      if (x === 0 || x === w-1 || y === 0 || y === 31)
        setPixel(x, y, border);
      else
        setPixel(x, y, fill);
    }
  }
}

// Vertical separator line
function drawVSep(x, color) {
  const rgb = hexToRGB(color);
  for (let y = 0; y < 32; y++) setPixel(x, y, rgb);
}

// Center text helpers (matching device _center_mid / _center_small)
const RIGHT_START = 17, RIGHT_W = 47;
function centerMidX(text) { return RIGHT_START + Math.floor((RIGHT_W - text.length * FONT_MID_W) / 2); }
function centerSmallX(text) { return RIGHT_START + Math.floor((RIGHT_W - text.length * FONT_SMALL_W) / 2); }

// =========================================================================
// LED Matrix renderer
// =========================================================================
function renderMatrix() {
  ctx.fillStyle = '#0c0c0c';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  for (let y = 0; y < HEIGHT; y++) {
    for (let x = 0; x < WIDTH; x++) {
      const cx = x * SCALE + SCALE / 2;
      const cy = y * SCALE + SCALE / 2;
      const [r, g, b] = fb[y][x];
      if (r > 0 || g > 0 || b > 0) {
        ctx.save();
        ctx.shadowBlur = GLOW_BLUR;
        ctx.shadowColor = `rgb(${r},${g},${b})`;
        ctx.beginPath();
        ctx.arc(cx, cy, LED_RADIUS + 0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},0.3)`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, LED_RADIUS, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, LED_RADIUS);
        grad.addColorStop(0, `rgb(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)})`);
        grad.addColorStop(0.5, `rgb(${r},${g},${b})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0.7)`);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();
      } else {
        ctx.beginPath();
        ctx.arc(cx, cy, LED_RADIUS * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = '#151515';
        ctx.fill();
      }
    }
  }
}

// =========================================================================
// Logging
// =========================================================================
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
function log(msg, isErr) {
  const ts = new Date().toLocaleTimeString();
  const el = document.createElement('div');
  if (isErr) el.className = 'err';
  el.textContent = `[${ts}] ${msg}`;
  logEl.appendChild(el);
  logEl.scrollTop = logEl.scrollHeight;
}
function setStatus(s) { statusEl.textContent = s; }

// =========================================================================
// State (mirrors device)
// =========================================================================
let weather_str = "", weather_cond = "", weather_condMain = "";
let wind_str = "", _wind_speed = 0;
let tide_str = "", tide_type = "";
let _tide_level = 0.5, _basin_tick = 0;
let planes = [], showing_planes = false, plane_idx = 0;
let ships = [], ship_idx = 0;
let currentScreen = "loading";
let dataLoaded = false;
let _ship_cycle_start = 0;

const WEATHER_INTERVAL = 600, OPENSKY_INTERVAL = 60, SHIP_INTERVAL = 30;
const PLANE_CYCLE_SECS = 5, SHIP_WEATHER_SECS = 30, SHIP_DISPLAY_SECS = 10;
const PLANES_ENABLED = false, SHIPS_ENABLED = true;

let last_weather_fetch = -WEATHER_INTERVAL;
let last_sky_fetch = -OPENSKY_INTERVAL;
let last_ship_fetch = -SHIP_INTERVAL;
let last_plane_cycle = 0;

const flightCache = {};
const _airlineCache = {};

function monotonic() { return performance.now() / 1000; }

// =========================================================================
// Condition short names (same as device conditions.csv)
// =========================================================================
const COND_SHORT = {
  200:'Thndr Rain',201:'Thndr Rain',202:'Thndr Rain',210:'Lt Thndrs',
  211:'Thndrstm',212:'Hvy Thndrs',221:'Thndrstm',230:'Thndr Drzl',

  302:'Hvy Drzzle',310:'Drzzl Rain',311:'Drzzl Rain',312:'Drzzl Rain',

// =========================================================================
// Airline lookup
// =========================================================================
const AIRLINE_PREFETCH = {
  'UAL':{name:'United',iata:'UA',color:0x0055A4},
  'DAL':{name:'Delta',iata:'DL',color:0xCC2222},
  'AAL':{name:'American',iata:'AA',color:0xCC2222},
  'JBU':{name:'JetBlue',iata:'B6',color:0x0033CC},
  'SWA':{name:'SouthWst',iata:'WN',color:0xF9A01B},
  'BAW':{name:'British',iata:'BA',color:0x1B3D6D},
  'NKS':{name:'Spirit',iata:'NK',color:0xF0CB00},
  'ASA':{name:'Alaska',iata:'AS',color:0x01426A},
  'RPA':{name:'Republic',iata:'YX',color:0x3366BB},
  'FFT':{name:'Frontier',iata:'F9',color:0x008040},
};
function getAirlineInfo(callsign) {
  const p = callsign.substring(0,3).toUpperCase();
  return AIRLINE_PREFETCH[p] || {name:p, iata:p.substring(0,2), color:0x00AA44};
}

// Ship type colors
const SHIP_TYPE_COLORS = {3:0x44AA44,4:0xFF8800,5:0xAAAA00,6:0x44AAFF,7:0xCC8844,8:0xFF4444,9:0x888888};
function getShipColor(tc) { return SHIP_TYPE_COLORS[Math.floor((tc||0)/10)] || 0x666688; }
const SHIP_ABBREV = {Fishing:'FSH',HighSpeed:'HSC',Special:'SPL',Passenger:'PAX',Cargo:'CGO',Tanker:'TNK',Other:'OTH',Vessel:'VES'};

// Heading to compass
function headingToCompass(h) {
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(((h%360)+360)%360/45)%8];
}

// Temp color
function getTempColor(tempStr) {
  let v = 60;
  try { v = parseInt(tempStr.split('\u00B0')[0]); } catch(e) {}
  if (v >= 90) return 0xFF2222;
  if (v >= 80) return 0xFF8800;
  if (v >= 60) return 0xFFDD00;
  if (v >= 40) return 0x88FFCC;
  if (v >= 20) return 0x44AAFF;
  return 0x2255CC;
}

// =========================================================================
// Screen composition — mirrors device exactly
// =========================================================================

function composeWeather(timestamp) {
  clearFB();

  // LEFT COLUMN: tide basin (16px wide)
  const waterTop = Math.max(8, Math.min(30, Math.floor(30 - _tide_level * 22)));
  const w = Math.min(_wind_speed, 25);
  const amp = 0.3 + w * 0.06;
  const spd = 0.3 + w * 0.02;
  const chp = 0.5 + w * 0.03;
  const thr = 0.2 - w * 0.02;
  const extra = w >= 15 ? 1 : 0;
  const deep = [3,20,32], mid = [6,40,56], surf = [12,56,80];

  for (let row = 0; row < 32; row++) {
    for (let col = 0; col < 16; col++) {
      if (row < waterTop - extra) {
        // air
      } else if (row <= waterTop) {
        let wave = Math.sin(col * chp + _basin_tick * spd) * amp;
        if (w >= 10) wave += Math.sin(col * 1.3 + _basin_tick * spd * 1.7) * amp * 0.4;
        if (wave > thr) setPixel(col, row, surf);
      } else if (row === waterTop + 1) {
        const wave = Math.sin(col * chp + _basin_tick * spd + 1.0);
        setPixel(col, row, wave > 0 ? surf : mid);
      } else {
        setPixel(col, row, deep);
      }
    }
  }

  // Tide time at bottom of column
  const tideColor = _tide_level < 0.2 ? 0xFFFFFF : 0x00CCDD;
  drawTextSmall(tide_str, 1, 29, tideColor);

  // Vertical separator
  drawVSep(16, 0x222233);

  // Clock — centered, mid font
  const now = new Date();
  let h = now.getHours() % 12 || 12;
  const m = now.getMinutes().toString().padStart(2, '0');
  const ap = now.getHours() < 12 ? 'A' : 'P';
  const clockStr = `${h}:${m} ${ap}M`;
  drawTextMid(clockStr, centerMidX(clockStr), 4, 0xFFFFFF);

  // Weather icon + temp — centered together
  const iconName = ICON_MAP[weather_condMain] || 'cloud';
  const iconColor = ICON_COLORS[weather_condMain] || 0xAAAAAA;
  const tempColor = getTempColor(weather_str);
  const tw = weather_str.length * FONT_MID_W;
  const tempX = RIGHT_START + Math.floor((RIGHT_W - tw) / 2);
  drawIcon8(ICONS[iconName], tempX - 10, 9, iconColor);
  drawTextMid(weather_str, tempX, 12, tempColor);

  // Condition — centered, small
  drawTextSmall(weather_cond, centerSmallX(weather_cond), 20, 0x888899);

  // Wind — centered, small
  drawTextSmall(wind_str, centerSmallX(wind_str), 28, 0x6699AA);

  setStatus(`Weather: ${weather_str} ${weather_cond} | Wind: ${wind_str} | Tide: ${tide_str}`);
}

function composePlane(plane) {
  clearFB();
  const info = getAirlineInfo(plane.call);
  const flight = flightCache[plane.call] || {};
  const color = info.color;
  const r = (color>>16)&0xFF, g = (color>>8)&0xFF, b = color&0xFF;

  // Left column: airline logo box (14px)
  drawLeftColumn(14, color, ((r>>2)<<16)|((g>>2)<<8)|(b>>2));

  // IATA code centered in box
  const bright = r*0.299+g*0.587+b*0.114;
  const textColor = bright > 140 ? 0x111111 : 0xFFFFFF;
  const iataX = 1 + Math.floor((14 - info.iata.length * FONT_W) / 2);
  drawTextLarge(info.iata, iataX, 16, textColor);

  // Row 1: Route (large)
  const origin = flight.origin || '???';
  const dest = flight.dest || '???';
  drawTextLarge(`${origin}>${dest}`, 16, 4, 0xFFFFFF);

  // Row 2: Airline (left) + type (right) — small
  drawTextSmall(info.name.substring(0,8), 16, 13, color);
  const acType = flight.type || '';
  if (acType) {
    const typeX = Math.max(18, 64 - acType.length * FONT_SMALL_W);
    drawTextSmall(acType, typeX, 13, 0x55AADD);
  }

  // Row 3: Altitude
  const altK = Math.floor(plane.alt / 1000);
  const compass = headingToCompass(plane.hdg);
  if (altK > 0) drawTextSmall(`Alt: ${altK}k ft ${compass}`, 16, 20, 0x44AA44);

  // Row 4: Registration
  const reg = flight.reg || '';
  if (reg) drawTextSmall(`Reg: ${reg}`, 16, 27, 0x667788);

  setStatus(`Plane: ${plane.call} | ${origin}>${dest} | ${info.name}`);
}

function composeShip(ship) {
  clearFB();
  const tc = ship.type || 0;
  const color = getShipColor(tc);
  const r = (color>>16)&0xFF, g = (color>>8)&0xFF, b = color&0xFF;
  const typeName = ship.type_name || 'Vessel';
  const abbrev = SHIP_ABBREV[typeName] || 'VES';

  // Left column
  drawLeftColumn(14, color, ((r>>2)<<16)|((g>>2)<<8)|(b>>2));

  // Type abbreviation
  const bright = r*0.299+g*0.587+b*0.114;
  drawTextSmall(abbrev, 1, 16, bright > 140 ? 0x111111 : 0xFFFFFF);

  // Row 1: Ship name (mid font)
  drawTextMid((ship.name||'UNKNOWN').substring(0,9), 16, 5, 0xFFFFFF);

  // Row 2: Type
  drawTextSmall(typeName, 16, 15, color);

  // Row 3: Destination
  const dest = ship.destination || '';
  if (dest) drawTextSmall(`To:${dest.substring(0,8)}`, 16, 23, 0x888899);

  setStatus(`Ship: ${ship.name} | ${typeName} | ${dest}`);
}

function composeLoading(timestamp) {
  clearFB();
  const pulse = Math.sin(timestamp / 1000 * 2) * 0.3 + 0.7;
  const v = Math.floor(255 * pulse);
  drawTextLarge("LOADING...", 4, 12, (v<<16)|(v<<8));
}

// =========================================================================
// API calls (through simulator server → proxy)
// =========================================================================
async function fetchWeather() {
  try {
    const resp = await fetch('/api/weather');
    const data = await resp.json();
    const temp = Math.round(data.main.temp);
    weather_condMain = data.weather[0].main;
    const condId = data.weather[0].id;
    weather_cond = COND_SHORT[condId] || data.weather[0].description.substring(0,10);
    weather_str = `${temp}\u00B0F`;
    _wind_speed = Math.round(data.wind?.speed || 0);
    const windDir = headingToCompass(data.wind?.deg || 0);
    wind_str = `${_wind_speed}mph ${windDir}`;
    log(`Weather: ${weather_str} ${weather_cond} Wind: ${wind_str}`);
  } catch(e) { log(`Weather err: ${e.message}`, true); }
}

async function fetchTides() {
  try {
    const resp = await fetch('/api/tides');
    const data = await resp.json();
    const preds = data.predictions || [];
    const now = new Date();
    const nowMins = now.getHours()*60 + now.getMinutes();
    for (const p of preds) {
      const [hStr,mStr] = p.t.split(' ')[1].split(':');
      const h = parseInt(hStr);
      if (h*60+parseInt(mStr) >= nowMins) {
        tide_type = p.type;
        const h12 = h%12||12;
        tide_str = `${h12}:${mStr}`;
        log(`Tide: ${tide_type==='H'?'HI':'LO'} ${tide_str}`);
        break;
      }
    }
  } catch(e) { log(`Tide err: ${e.message}`, true); }
}

async function fetchShips() {
  try {
    const resp = await fetch('/api/ships');
    const data = await resp.json();
    ships = data.ships || [];
    log(`Ships: ${ships.length}`);
  } catch(e) { log(`Ships err: ${e.message}`, true); }
}

// =========================================================================
// Main loops
// =========================================================================
async function logicTick() {
  const now = monotonic();
  if (now - last_weather_fetch >= WEATHER_INTERVAL) {
    await fetchWeather();
    await fetchTides();
    last_weather_fetch = now;
    dataLoaded = true;
  }
  if (SHIPS_ENABLED && now - last_ship_fetch >= SHIP_INTERVAL) {
    await fetchShips();
    last_ship_fetch = now;
    if (ships.length && _ship_cycle_start === 0) _ship_cycle_start = now;
  }
}

let lastFrameTime = 0;
function renderLoop(timestamp) {
  const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.1);
  lastFrameTime = timestamp;
  _basin_tick += dt;

  if (!dataLoaded) {
    composeLoading(timestamp);
  } else if (showing_planes && planes.length > 0) {
    composePlane(planes[plane_idx % planes.length]);
  } else {
    // Ship/weather cycling
    const now = monotonic();
    if (SHIPS_ENABLED && ships.length > 0) {
      const cyclePos = (now - _ship_cycle_start) % (SHIP_WEATHER_SECS + SHIP_DISPLAY_SECS);
      if (cyclePos >= SHIP_WEATHER_SECS) {
        const shipPhase = cyclePos - SHIP_WEATHER_SECS;
        const idx = Math.floor(shipPhase / 5) % ships.length;
        composeShip(ships[idx]);
      } else {
        composeWeather(timestamp);
      }
    } else {
      composeWeather(timestamp);
    }
  }

  renderMatrix();
  requestAnimationFrame(renderLoop);
}
